name: Log Hugging Face Downloads Monthly

on:
  schedule:
    - cron: "0 1 1 * *" # 每月 1 号 1:00 UTC 运行
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hf-download-log
  cancel-in-progress: true

jobs:
  log-hf-downloads:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub matplotlib

      - name: Run logging script
        run: python log_hf_downloads.py

      - name: Commit and push if changed
        run: |
          git config user.name "QIANJINYDX"
          git config user.email "2282922115@qq.com"
          git add other/log_model_download.txt other/log_dataset_download.txt other/hf_downloads_chart.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "📊 Update HF download logs & chart"
          git push
